<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANGANRONPA EXPLAINED</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Inconsolata:wght@400;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8003d;
    --white: #f5f0e8;
    --black: #0a0a0a;
    --grey: #1a1a1a;
    --dim: #2d2d2d;
    --accent: #ff4d6d;
    --mono: 'Inconsolata', monospace;
    --display: 'Black Han Sans', sans-serif;
    --body: 'Noto Serif JP', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--mono);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  #cursor {
    position: fixed;
    width: 20px; height: 20px;
    border: 2px solid var(--red);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, border-color 0.2s;
    mix-blend-mode: difference;
  }
  #cursor.clicked { transform: translate(-50%,-50%) scale(0.5); border-color: var(--white); }

  /* SCANLINES */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 500;
  }

  /* NOISE OVERLAY */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 499;
    opacity: 0.4;
  }

  /* ============ TITLE SCREEN ============ */
  #title-screen {
    position: fixed;
    inset: 0;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.8s;
  }

  .title-bg-pattern {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(232,0,61,0.03) 30px, rgba(232,0,61,0.03) 31px),
      repeating-linear-gradient(-45deg, transparent, transparent 30px, rgba(232,0,61,0.03) 30px, rgba(232,0,61,0.03) 31px);
  }

  .blood-drip {
    position: absolute;
    top: 0;
    width: 100%;
    height: 80px;
    background: linear-gradient(to bottom, var(--red), transparent);
    opacity: 0.15;
  }

  .monokuma-icon {
    width: 80px;
    height: 80px;
    margin-bottom: 24px;
    animation: bob 3s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .title-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 16px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .title-main {
    font-family: var(--display);
    font-size: clamp(48px, 9vw, 96px);
    color: var(--white);
    line-height: 0.9;
    text-align: center;
    letter-spacing: -2px;
    position: relative;
  }

  .title-main .red { color: var(--red); }

  .title-main::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    color: var(--red);
    clip-path: inset(30% 0 60% 0);
    animation: glitch 4s infinite;
    opacity: 0.8;
  }

  @keyframes glitch {
    0%,89%,100%{clip-path:inset(100% 0 0 0); transform:none}
    90%{clip-path:inset(20% 0 65% 0); transform:translate(-4px,0)}
    91%{clip-path:inset(50% 0 30% 0); transform:translate(4px,0)}
    92%{clip-path:inset(70% 0 15% 0); transform:translate(-2px,0)}
    93%{clip-path:inset(100% 0 0 0); transform:none}
  }

  .title-sub {
    font-size: 13px;
    letter-spacing: 0.3em;
    color: rgba(245,240,232,0.5);
    text-transform: uppercase;
    margin-top: 20px;
  }

  .start-btn {
    margin-top: 48px;
    padding: 14px 48px;
    background: var(--red);
    color: var(--white);
    font-family: var(--mono);
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    border: none;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }

  .start-btn:hover::before { transform: translateX(0); }
  .start-btn:hover { transform: scale(1.04); }

  .case-count {
    margin-top: 24px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(245,240,232,0.3);
  }

  /* ============ MAIN APP ============ */
  #app {
    display: none;
    height: 100vh;
    width: 100vw;
    flex-direction: column;
    position: relative;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid rgba(232,0,61,0.2);
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(8px);
    z-index: 10;
    flex-shrink: 0;
  }

  .topbar-title {
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--white);
  }

  .topbar-title span { color: var(--red); }

  .chapter-indicator {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: all 0.3s;
    cursor: none;
  }
  .dot.active { background: var(--red); transform: scale(1.4); }
  .dot.done { background: rgba(232,0,61,0.4); }

  .progress-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(245,240,232,0.4);
    text-transform: uppercase;
    margin-left: 12px;
  }

  /* CONTENT AREA */
  .content-area {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* SLIDE */
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    padding: 0 48px;
    gap: 48px;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .slide.active {
    opacity: 1;
    pointer-events: all;
  }

  /* LEFT PANEL */
  .left-panel {
    flex: 0 0 340px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .game-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 16px;
    border: 1px solid var(--red);
    background: rgba(232,0,61,0.08);
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    width: fit-content;
  }

  .game-badge-num {
    font-family: var(--display);
    font-size: 22px;
    color: var(--red);
    line-height: 1;
  }

  .game-badge-text {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.6);
    line-height: 1.4;
  }

  .slide-heading {
    font-family: var(--display);
    font-size: clamp(28px, 3.5vw, 44px);
    line-height: 1.05;
    color: var(--white);
  }

  .slide-heading .highlight { color: var(--red); }

  .slide-meta {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: rgba(245,240,232,0.35);
    text-transform: uppercase;
    padding-top: 4px;
    border-top: 1px solid rgba(245,240,232,0.1);
  }

  /* CHARACTER CARDS */
  .char-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .char-tag {
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: 0.1em;
    border: 1px solid rgba(245,240,232,0.12);
    color: rgba(245,240,232,0.55);
    background: rgba(245,240,232,0.03);
    white-space: nowrap;
    transition: all 0.2s;
  }

  .char-tag.culprit {
    border-color: rgba(232,0,61,0.4);
    color: var(--accent);
    background: rgba(232,0,61,0.06);
  }

  .char-tag.victim {
    border-color: rgba(100,100,100,0.4);
    color: rgba(245,240,232,0.3);
    text-decoration: line-through;
    text-decoration-color: var(--red);
  }

  .char-tag.survivor {
    border-color: rgba(245,240,232,0.3);
    color: var(--white);
  }

  /* RIGHT PANEL */
  .right-panel {
    flex: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
    overflow: hidden;
  }

  /* NARRATIVE CARDS */
  .narrative-stack {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow: hidden;
    padding: 24px 0;
  }

  .card {
    background: var(--grey);
    border: 1px solid rgba(245,240,232,0.06);
    border-left: 3px solid transparent;
    padding: 18px 22px;
    position: relative;
    transition: all 0.3s;
    flex-shrink: 0;
    margin-bottom: 8px;
  }

  .card:hover {
    border-left-color: var(--red);
    background: var(--dim);
  }

  .card-type {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-type::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--red);
  }

  .card-text {
    font-family: var(--body);
    font-size: 13px;
    line-height: 1.75;
    color: rgba(245,240,232,0.85);
  }

  .card-text strong {
    color: var(--white);
    font-weight: 700;
  }

  .card-text .red { color: var(--accent); font-weight: 700; }

  .card.murder {
    border-color: rgba(232,0,61,0.15);
    background: rgba(232,0,61,0.04);
  }

  .card.murder .card-type { color: var(--red); }

  .card.reveal {
    border-color: rgba(255,255,100,0.1);
    background: rgba(255,255,100,0.02);
  }

  .card.reveal .card-type { color: #d4c56a; }

  .card.verdict {
    border-top: 2px solid var(--red);
    background: rgba(232,0,61,0.06);
  }

  /* MURDER LOG */
  .murder-log {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(232,0,61,0.2);
    padding: 16px 20px;
    font-size: 11px;
    line-height: 2;
    flex-shrink: 0;
  }

  .murder-log-title {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(232,0,61,0.2);
  }

  .murder-entry {
    display: flex;
    gap: 12px;
    align-items: baseline;
    color: rgba(245,240,232,0.5);
    padding: 2px 0;
    border-bottom: 1px solid rgba(245,240,232,0.04);
  }

  .murder-entry:last-child { border-bottom: none; }

  .murder-entry .victim-name {
    color: rgba(245,240,232,0.7);
    text-decoration: line-through;
    text-decoration-color: rgba(232,0,61,0.6);
    min-width: 160px;
  }

  .murder-entry .killer-name {
    color: var(--accent);
  }

  .arrow {
    color: rgba(232,0,61,0.5);
    font-size: 10px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 48px;
    border-top: 1px solid rgba(232,0,61,0.15);
    flex-shrink: 0;
    background: rgba(10,10,10,0.8);
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid rgba(245,240,232,0.12);
    color: rgba(245,240,232,0.5);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: none;
    transition: all 0.25s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--red);
    color: var(--white);
    background: rgba(232,0,61,0.08);
  }

  .nav-btn:disabled { opacity: 0.2; }

  .nav-btn.primary {
    background: var(--red);
    border-color: var(--red);
    color: var(--white);
    font-weight: 700;
  }

  .nav-btn.primary:hover { background: var(--accent); border-color: var(--accent); }

  .slide-counter {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: rgba(245,240,232,0.3);
  }

  .slide-counter span { color: var(--red); }

  /* SCENE DIVIDER */
  .scene-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0;
  }

  .scene-divider::before, .scene-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(232,0,61,0.2);
  }

  .scene-divider-text {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(232,0,61,0.5);
  }

  /* MONOKUMA SVG */
  .monokuma-face {
    width: 120px;
    height: 120px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 20px rgba(232,0,61,0.3));
    animation: bob 3s ease-in-out infinite;
  }

  /* SCROLL AREA */
  .narrative-scroll {
    overflow-y: auto;
    flex: 1;
    padding-right: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--red) transparent;
  }

  .narrative-scroll::-webkit-scrollbar { width: 3px; }
  .narrative-scroll::-webkit-scrollbar-thumb { background: var(--red); }

  /* TWIST BANNER */
  .twist-banner {
    background: var(--red);
    color: var(--white);
    text-align: center;
    padding: 8px;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-weight: 900;
    animation: blink-banner 1.5s infinite;
  }

  @keyframes blink-banner {
    0%,100%{opacity:1} 50%{opacity:0.7}
  }

  /* ENTRY ANIMATION */
  @keyframes slide-in-right {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes slide-in-left {
    from { transform: translateX(-40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .slide.active .left-panel { animation: slide-in-left 0.5s ease forwards; }
  .slide.active .right-panel { animation: slide-in-right 0.5s ease forwards; }

  /* VERDICT SCREEN */
  .verdict-screen {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 32px;
  }

  .verdict-big {
    font-family: var(--display);
    font-size: clamp(40px, 7vw, 72px);
    color: var(--red);
    line-height: 1;
    animation: glitch 3s infinite;
  }

  .verdict-big::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    color: var(--white);
    clip-path: inset(0 0 80% 0);
    animation: glitch-2 3s infinite 0.3s;
  }

  @keyframes glitch-2 {
    0%,94%,100%{clip-path:inset(100% 0 0 0)} 
    95%{clip-path:inset(60% 0 20% 0); transform:translate(3px,0)}
    96%{clip-path:inset(20% 0 70% 0); transform:translate(-3px,0)}
  }

  .survivors-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 600px;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .slide { flex-direction: column; padding: 20px; gap: 20px; }
    .left-panel { flex: none; width: 100%; }
    .slide-heading { font-size: 24px; }
    .topbar { padding: 10px 16px; }
    .bottom-nav { padding: 10px 16px; }
  }
</style>
</head>
<body>

<div id="cursor"></div>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="title-bg-pattern"></div>
  <div class="blood-drip"></div>

  <!-- Monokuma SVG -->
  <svg class="monokuma-icon" viewBox="0 0 80 80" fill="none">
    <circle cx="40" cy="40" r="36" fill="#f5f0e8" stroke="#0a0a0a" stroke-width="2"/>
    <!-- Left half black -->
    <path d="M40 4 A36 36 0 0 0 40 76 Z" fill="#0a0a0a"/>
    <!-- Left white eye -->
    <circle cx="28" cy="32" r="9" fill="white"/>
    <circle cx="28" cy="33" r="5" fill="#0a0a0a"/>
    <circle cx="26" cy="31" r="1.5" fill="white"/>
    <!-- Right red eye -->
    <circle cx="52" cy="32" r="9" fill="#e8003d"/>
    <circle cx="52" cy="33" r="5" fill="#0a0a0a"/>
    <circle cx="50" cy="31" r="1.5" fill="white"/>
    <!-- Nose -->
    <circle cx="40" cy="42" r="3" fill="#0a0a0a"/>
    <!-- Smile -->
    <path d="M28 52 Q40 64 52 52" stroke="#0a0a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Ears -->
    <ellipse cx="12" cy="24" rx="6" ry="10" fill="#f5f0e8" stroke="#0a0a0a" stroke-width="2"/>
    <ellipse cx="68" cy="24" rx="6" ry="10" fill="#f5f0e8" stroke="#0a0a0a" stroke-width="2"/>
    <ellipse cx="12" cy="24" rx="3" ry="6" fill="#0a0a0a"/>
  </svg>

  <div class="title-label">▸ NOW PLAYING</div>
  <div class="title-main" data-text="DANGANRONPA">DANGAN<span class="red">RONPA</span></div>
  <div class="title-sub">explained — all three games</div>
  <button class="start-btn" onclick="startApp()">▶ BEGIN EXPLANATION</button>
  <div class="case-count">3 GAMES · 15 MURDERS · 1 MASTERMIND</div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-title">DANGAN<span>RONPA</span> EXPLAINED</div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="chapter-indicator" id="dots"></div>
      <div class="progress-label" id="progress-label">INTRO</div>
    </div>
  </div>

  <!-- CONTENT AREA -->
  <div class="content-area" id="slides-container"></div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>◀ PREV</button>
    <div class="slide-counter">SLIDE <span id="cur-num">1</span> / <span id="tot-num">1</span></div>
    <button class="nav-btn primary" id="next-btn" onclick="navigate(1)">NEXT ▶</button>
  </div>

</div>

<script>
// ===================== DATA =====================
const slides = [
  // 0 — INTRO
  {
    label: "INTRO",
    game: null,
    content: `
      <div class="slide-heading">What is<br><span class="highlight">Danganronpa?</span></div>
      <div class="slide-meta">VISUAL NOVEL · MYSTERY · DESPAIR</div>
    `,
    rightContent: `
      <div class="narrative-scroll">
        <div class="card">
          <div class="card-type">premise</div>
          <div class="card-text">
            <strong>Danganronpa</strong> is a series of murder-mystery visual novels by Spike Chunsoft. Each game traps a group of "<red>Ultimate</red>" high-school students — the best in the world at their respective talents — in a killing game run by a sadistic robotic bear named <strong>Monokuma</strong>.
          </div>
        </div>
        <div class="card">
          <div class="card-type">the rules</div>
          <div class="card-text">
            To <red>escape</red>, a student must murder one of their classmates and <strong>get away with it</strong> in a class trial. If the class correctly identifies the killer, the killer is executed. If the class guesses wrong — everyone dies except the killer.<br><br>
            The games follow the surviving students as they investigate murders, run class trials, and hunt for the mysterious mastermind pulling the strings.
          </div>
        </div>
        <div class="card">
          <div class="card-type">the series</div>
          <div class="card-text">
            Three mainline games were released: <strong>Trigger Happy Havoc</strong> (2010), <strong>Goodbye Despair</strong> (2012), and <strong>Killing Harmony</strong> (2017). They share characters, lore, and a recurring mythology around <red>Hope vs. Despair</red>.
          </div>
        </div>
      </div>
    `
  },

  // 1 — DR1 SETUP
  {
    label: "GAME 1",
    game: { num: "01", title: "TRIGGER HAPPY HAVOC" },
    content: `
      <div class="slide-heading">Hope's Peak<br><span class="highlight">Academy</span></div>

// ===================== APP =====================
let current = 0;

function startApp() {
  const ts = document.getElementById('title-screen');
  ts.style.opacity = '0';
  setTimeout(() => {
    ts.style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'flex';
    buildSlides();
    buildDots();
    showSlide(0);
  }, 800);
}

function buildSlides() {
  const container = document.getElementById('slides-container');
  document.getElementById('tot-num').textContent = slides.length;

  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.id = `slide-${i}`;

    let leftHtml = `<div class="left-panel">`;
    if (s.game) {
      leftHtml += `<div class="game-badge">
        <div class="game-badge-num">${s.game.num}</div>
        <div class="game-badge-text">DANGANRONPA<br>${s.game.title}</div>
      </div>`;
    }
    leftHtml += s.content + `</div>`;

    const rightHtml = `<div class="right-panel"><div class="narrative-scroll">${s.rightContent}</div></div>`;

    div.innerHTML = leftHtml + rightHtml;
    container.appendChild(div);
  });
}

function buildDots() {
  const dotsEl = document.getElementById('dots');
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = `dot-${i}`;
    d.onclick = () => navigate(i - current);
    dotsEl.appendChild(d);
  });
}

function showSlide(n) {
  const prev = document.getElementById(`slide-${current}`);
  if (prev) prev.classList.remove('active');

  current = n;
  const cur = document.getElementById(`slide-${current}`);
  cur.classList.add('active');

  // Reset scroll
  const scroll = cur.querySelector('.narrative-scroll');
  if (scroll) scroll.scrollTop = 0;

  // Dots
  slides.forEach((_, i) => {
    const d = document.getElementById(`dot-${i}`);
    d.className = 'dot';
    if (i === current) d.classList.add('active');
    else if (i < current) d.classList.add('done');
  });

  // Label
  document.getElementById('progress-label').textContent = slides[current].label;
  document.getElementById('cur-num').textContent = current + 1;

  // Buttons
  document.getElementById('prev-btn').disabled = current === 0;
  const nextBtn = document.getElementById('next-btn');
  if (current === slides.length - 1) {
    nextBtn.textContent = '▶ RESTART';
    nextBtn.onclick = () => { showSlide(0); };
  } else {
    nextBtn.textContent = 'NEXT ▶';
    nextBtn.onclick = () => navigate(1);
  }
}

function navigate(dir) {
  const next = Math.max(0, Math.min(slides.length - 1, current + dir));
  if (next !== current) showSlide(next);
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
});

// Custom cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursor.classList.add('clicked'));
document.addEventListener('mouseup', () => cursor.classList.remove('clicked'));
</script>
